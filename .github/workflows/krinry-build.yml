name: krinry Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options: [debug, profile, release]
      output_type:
        description: 'Output type'
        required: true
        default: 'apk'
        type: choice
        options: [apk, appbundle, apk-split]
      target_platform:
        description: 'Target platform'
        required: false
        default: 'all'
        type: choice
        options: [all, android-arm64, android-arm, android-x64]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'

      - name: Pub get
        run: flutter pub get

      - name: Create android folder
        run: flutter create --platforms android .

      - name: Change app label to Abbas
        run: |
          sed -i 's/android:label="[^"]*"/android:label="Abbas"/g' android/app/src/main/AndroidManifest.xml

      - name: Set package name to com.alaa.keymaster
        run: |
          sed -i 's/applicationId .*/applicationId "com.alaa.keymaster"/g' android/app/build.gradle

      - name: Copy app icon
        run: |
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          cp assets/images/app_icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png || true
          cp assets/images/app_icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png || true
          cp assets/images/app_icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png || true
          cp assets/images/app_icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png || true
          cp assets/images/app_icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png || true

      - name: Build
        run: |
          TYPE="${{ github.event.inputs.build_type }}"
          OUT="${{ github.event.inputs.output_type }}"
          PLAT="${{ github.event.inputs.target_platform }}"
          if [ "$OUT" = "apk" ]; then
            if [ "$PLAT" != "all" ]; then
              flutter build apk --$TYPE --target-platform $PLAT
            else
              flutter build apk --$TYPE
            fi
          elif [ "$OUT" = "apk-split" ]; then
            flutter build apk --$TYPE --split-per-abi
          elif [ "$OUT" = "appbundle" ]; then
            flutter build appbundle --$TYPE
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/*/*.aab
          retention-days: 7
